<main>

  <section>

    <h2>Entre em Contato</h2>

    <p>
      Se você quiser falar comigo, enviar sugestões ou oportunidades, preencha o formulário abaixo.
    </p>

    <form id="formContato">

      <input 
        type="text" 
        id="nome" 
        placeholder="Seu nome"
      >

      <br><br>

      <input 
        type="email" 
        id="email" 
        placeholder="Seu e-mail"
      >

      <br><br>

      <textarea 
        id="mensagem" 
        placeholder="Sua mensagem"
      ></textarea>

      <br><br>

      <button type="submit">Enviar Mensagem</button>

      <p id="erro"></p>

    </form>
