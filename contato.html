<h2>Entre em Contato</h2>

<p>
Se você quiser falar comigo, enviar sugestões ou oportunidades,
preencha o formulário abaixo.
</p>

<form action="https://formsubmit.co/luciano_lucas4@outlook.com" method="POST">

    <input
        type="text"
        name="Nome"
        placeholder="Seu nome"
        required>

    <br><br>

    <input
        type="email"
        name="Email"
        placeholder="Seu e-mail"
        required>

    <br><br>

    <textarea
        name="Mensagem"
        placeholder="Sua mensagem"
        required></textarea>

    <br><br>

    <!-- Evita spam -->
    <input type="hidden" name="_captcha" value="false">

    <!-- Redireciona após o envio -->
    <input type="hidden" name="_next" value="https://lucianosilva4.github.io/meu-site/contato.html">

    <button type="submit">
        Enviar Mensagem
    </button>

</form>
